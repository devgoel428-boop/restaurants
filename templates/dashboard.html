<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRSnap - Merchant Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body { background-color: #0A0A0A; color: #FFFFFF; font-family: 'Inter', sans-serif; }
        .glow-input { box-shadow: 0 0 15px rgba(188, 47, 50, 0.4); transition: box-shadow 0.3s ease; }
        .glow-input:focus-within { box-shadow: 0 0 25px rgba(188, 47, 50, 0.8); }
        .ai-gradient { background: linear-gradient(135deg, #1A1A1A, #0f0f0f); }
    </style>
</head>
<body class="flex min-h-screen">
    <aside class="w-64 border-r border-gray-800 p-6 flex flex-col bg-[#050505] shadow-xl">
        <h2 class="text-3xl font-extrabold mb-10 tracking-wider">QR<span class="text-[#BC2F32]">Snap</span></h2>
        <nav class="space-y-6 flex-grow">
            <a href="/dashboard" class="flex items-center gap-3 text-white font-semibold text-lg hover:text-[#BC2F32] transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Overview
            </a>
            <a href="/kds/demo" target="_blank" class="flex items-center gap-3 text-gray-400 font-medium text-lg hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Live KDS
            </a>
            <a href="#" class="flex items-center gap-3 text-gray-400 font-medium text-lg hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                Menu Manager
            </a>
            <a href="#" class="flex items-center gap-3 text-gray-400 font-medium text-lg hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                QR Generator
            </a>
        </nav>
        <div class="mt-auto pt-6 border-t border-gray-800">
            <p class="text-gray-500 text-sm">Restaurant ID: <span class="text-white font-mono">demo</span></p>
        </div>
    </aside>
    
    <main class="flex-grow p-10 bg-[#0A0A0A]">
        <header class="mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-bold mb-2 tracking-tight">Welcome back, Owner</h1>
                <p class="text-gray-400">Here's your restaurant's pulse today.</p>
            </div>
            <div class="text-right">
                <div class="inline-flex items-center bg-green-500/10 text-green-500 px-4 py-2 border border-green-500/20 rounded-full font-medium">
                    <span class="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></span> App Online
                </div>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-16">
            <div class="bg-[#111] border border-gray-800 p-8 rounded-2xl shadow-lg relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition"><svg class="w-16 h-16" fill="currentColor" viewBox="0 0 20 20"><path d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102-1.106 4.637c-.194.813.691 1.456 1.405 1.02L10 15.591l4.069 2.485c.713.436 1.598-.207 1.404-1.02l-1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382-1.831-4.401z"></path></svg></div>
                <p class="text-gray-400 mb-2 font-medium">Today's Revenue</p>
                <p class="text-5xl font-extrabold text-[#BC2F32]">₹14,500</p>
            </div>
            <div class="bg-[#111] border border-gray-800 p-8 rounded-2xl shadow-lg relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition"><svg class="w-16 h-16" fill="currentColor" viewBox="0 0 20 20"><path d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3zM16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"></path></svg></div>
                <p class="text-gray-400 mb-2 font-medium">Active Orders</p>
                <p class="text-5xl font-extrabold text-white">12</p>
            </div>
            <div class="bg-[#111] border border-gray-800 p-8 rounded-2xl shadow-lg relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition"><svg class="w-16 h-16" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 4a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm2 2V5h1v1H5zM3 13a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1H4a1 1 0 01-1-1v-3zm2 2v-1h1v1H5zM13 3a1 1 0 00-1 1v3a1 1 0 001 1h3a1 1 0 001-1V4a1 1 0 00-1-1h-3zm1 2v1h1V5h-1z" clip-rule="evenodd"></path><path d="M11 4a1 1 0 10-2 0v1a1 1 0 002 0V4zM10 7a1 1 0 011 1v1h2a1 1 0 110 2h-3a1 1 0 01-1-1V8a1 1 0 011-1zM16 9a1 1 0 100 2 1 1 0 000-2zM9 13a1 1 0 011-1h1a1 1 0 110 2v2a1 1 0 11-2 0v-3zM7 11a1 1 0 100-2H4a1 1 0 100 2h3zM17 13a1 1 0 01-1 1h-2a1 1 0 110-2h2a1 1 0 011 1zM16 17a1 1 0 100-2h-3a1 1 0 100 2h3z"></path></svg></div>
                <p class="text-gray-400 mb-2 font-medium">QR Scans Today</p>
                <p class="text-5xl font-extrabold text-white">84</p>
            </div>
        </div>

        <!-- AI Voice Command Center -->
        <div class="max-w-4xl mx-auto mt-20 ai-gradient p-1 rounded-full p-2 relative shadow-2xl">
            <div class="glow-input bg-gray-900 border border-gray-700 rounded-full flex items-center p-2">
                <button class="bg-[#BC2F32] p-5 rounded-full text-white mx-2 hover:bg-red-700 transition transform hover:scale-105 shadow-[0_0_15px_rgba(188,47,50,0.8)]" onclick="simulateVoice()" id="mic-btn">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                </button>
                <div class="flex-grow pl-4 border-l border-gray-700 ml-2">
                    <label for="ai-input" class="text-xs text-[#BC2F32] font-bold uppercase tracking-wider block mb-1">AI Assitant - Menu Command</label>
                    <input type="text" id="ai-input" placeholder="e.g. 'Change Pizza to 500 rupees' or 'Make Pasta out of stock'" class="bg-transparent border-none outline-none w-full text-2xl text-white placeholder-gray-600 font-medium pb-1">
                </div>
                <button class="mr-6 px-6 py-3 bg-gray-800 hover:bg-gray-700 rounded-full text-white font-bold transition border border-gray-600" onclick="sendCommand()">Run</button>
            </div>
        </div>
        
        <div id="ai-response-container" class="max-w-4xl mx-auto mt-6 hidden">
            <div class="bg-green-500/10 border border-green-500/30 p-4 rounded-xl flex items-start gap-4">
                <div class="bg-green-500/20 p-2 rounded-full text-green-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <div>
                    <h4 class="text-green-400 font-bold mb-1">AI Action Executed</h4>
                    <pre id="ai-response" class="text-gray-300 text-sm font-mono overflow-auto"></pre>
                </div>
            </div>
        </div>
    </main>

    <script>
        function simulateVoice() {
            const btn = document.getElementById('mic-btn');
            btn.classList.add('animate-pulse');
            document.getElementById('ai-input').value = "Listening...";
            
            setTimeout(() => {
                document.getElementById('ai-input').value = "Change Pizza to 500";
                btn.classList.remove('animate-pulse');
            }, 1500);
        }
        
        async function sendCommand() {
            const val = document.getElementById('ai-input').value;
            if(!val || val.includes("Listening")) return;
            
            try {
                // In local setup without actual startup, assuming this works
                const res = await fetch('/admin/voice-command', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({restaurant_id: "demo", transcript: val})
                });
                const data = await res.json();
                
                const container = document.getElementById('ai-response-container');
                const respEl = document.getElementById('ai-response');
                respEl.innerText = JSON.stringify(data, null, 2);
                container.classList.remove('hidden');
                
                // Clear input after 3s
                setTimeout(() => {
                    container.classList.add('hidden');
                    document.getElementById('ai-input').value = '';
                }, 5000);
                
            } catch(e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
