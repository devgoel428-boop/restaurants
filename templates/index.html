<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRSnap - Customer Khush, Aap Tension-Free</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0A0A0A; color: #FFFFFF; font-family: 'Inter', sans-serif; }
        .crimson-accent { color: #BC2F32; }
        .bg-crimson { background-color: #BC2F32; }
        .glass-nav { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex flex-col min-h-screen relative overflow-x-hidden">
    <!-- Background Decor -->
    <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-[#BC2F32] rounded-full blur-[150px] opacity-20 z-0"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-[#BC2F32] rounded-full blur-[150px] opacity-10 z-0"></div>

    <nav class="glass-nav p-6 flex justify-between items-center border-b border-gray-900 sticky top-0 z-50">
        <div class="text-3xl font-extrabold tracking-wider">QR<span class="crimson-accent">Snap</span></div>
        <a href="/auth/login/google" class="bg-crimson hover:bg-red-700 text-white px-6 py-2 rounded-full font-semibold transition">Merchant Login</a>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center text-center p-8 z-10">
        <div class="inline-block bg-gray-900 border border-gray-800 text-gray-300 px-4 py-1 rounded-full text-sm font-medium mb-8">
            The next generation SaaS for Desi Restaurants
        </div>
        
        <h1 class="text-6xl md:text-8xl font-extrabold mb-6 leading-tight tracking-tight">
            Customer Khush, <br>
            <span class="crimson-accent relative inline-block">
                Aap Tension-Free.
                <!-- Small underline decorative element -->
                <svg class="absolute w-full h-4 -bottom-2 left-0 text-[#BC2F32] opacity-80" viewBox="0 0 100 20" preserveAspectRatio="none">
                    <path d="M0 10 Q50 20 100 10" fill="none" stroke="currentColor" stroke-width="4"/>
                </svg>
            </span>
        </h1>
        
        <p class="text-xl md:text-2xl text-gray-400 mb-12 max-w-2xl font-medium">
            Take control of your orders with AI-powered multi-tenant menus and live KDS syncing. <br/> <span class="italic text-gray-500 text-lg">आप टेंशन-फ्री।</span>
        </p>
        
        <div class="flex flex-col sm:flex-row gap-6">
            <a href="/auth/login/google" class="bg-crimson hover:bg-red-700 text-white text-xl px-10 py-4 rounded-full font-bold transition transform hover:scale-105 shadow-[0_0_20px_rgba(188,47,50,0.4)]">Sign in with Google</a>
            <a href="/order/demo?table=1&sig=demo" class="border-2 border-gray-700 hover:border-gray-500 text-white text-xl px-10 py-4 rounded-full font-bold transition">Try Customer Menu</a>
        </div>
    </main>

    <footer class="p-6 text-center text-gray-600 border-t border-gray-900 z-10">
        &copy; 2026 QRSnap Built with FastAPI & Antigravity
    </footer>
</body>
</html>
